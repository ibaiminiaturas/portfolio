<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Ibai Miniaturas</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="/assets/js-obfuscated/i18n.js"></script>

<style>
body{
margin:0;
overflow-x:hidden;
font-family:'Montserrat',sans-serif;
background-color:#f3f4f6;
}
</style>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header id="main-header" class="sticky top-0 z-50 bg-white"></header>

<script>
fetch('/components/header.html')
.then(res=>res.text())
.then(html=>{
const header=document.getElementById('main-header');
header.innerHTML=html;

loadLanguage("en");

header.style.transition='box-shadow 0.3s ease';
window.addEventListener('scroll',()=>{
header.style.boxShadow=window.scrollY>10?'0 2px 8px rgba(0,0,0,0.1)':'none';
});

const script=document.createElement('script');
script.src=assets/js-obfuscated/menu.js';
document.body.appendChild(script);
});
</script>

<main class="max-w-6xl mx-auto px-6 py-16 space-y-12">

<!-- Título -->
<section class="text-center">
<h1 class="text-5xl font-extrabold text-gray-900" data-i18n="contact.title"></h1>
<p class="text-gray-700 text-lg mt-4" data-i18n="contact.subtitle"></p>
</section>


<!-- BLOQUE TEXTO + FORM -->
<section class="flex flex-col lg:flex-row gap-10 items-stretch">

<!-- TEXTO -->
<div class="lg:w-1/2 space-y-6 bg-gray-50 p-8 rounded-xl shadow-md">

<p class="text-lg text-gray-700" data-i18n="contact.intro1"></p>

<p class="text-lg text-gray-700" data-i18n="contact.intro2"></p>

<p class="text-lg text-gray-700" data-i18n="contact.intro3"></p>

</div>


<!-- FORMULARIO -->
<div class="lg:w-1/2 bg-white p-8 rounded-xl shadow-lg w-full">

<form id="contactForm"
action="https://formspree.io/f/xaqpelyo"
method="POST"
class="space-y-6">

<div>
<label class="block text-gray-700 font-semibold mb-2" data-i18n="contact.name"></label>
<input
type="text"
name="name"
required
class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-400">
</div>
<input type="text" name="_gotcha" style="display:none">
<div>
<label class="block text-gray-700 font-semibold mb-2" data-i18n="contact.email"></label>
<input
type="email"
name="email"
required
class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-400">
</div>

<div>
<label class="block text-gray-700 font-semibold mb-2" data-i18n="contact.message"></label>
<textarea
name="message"
rows="6"
required
class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-400"></textarea>
</div>

<button
type="submit"
class="w-full bg-gray-900 text-white py-3 rounded-lg hover:bg-gray-700 transition-colors duration-200 font-semibold"
data-i18n="contact.send">
</button>

<p id="form-status" class="text-center mt-4 hidden"></p>

</form>

</div>

</section>

</main>


<!-- FOOTER -->
<div id="footer-placeholder"></div>

<script>
fetch('/components/footer.html')
.then(res=>res.text())
.then(html=>{
document.getElementById('footer-placeholder').innerHTML=html;
});
</script>


<script>
const form = document.getElementById("contactForm");
const status = document.getElementById("form-status");

form.addEventListener("submit", async function(event) {

event.preventDefault();

const data = new FormData(form);

const response = await fetch(form.action,{
method: form.method,
body: data,
headers:{'Accept':'application/json'}
});

if(response.ok){

status.classList.remove("hidden");
status.classList.remove("text-red-600");
status.classList.add("text-green-600");

status.innerText="Message sent successfully!";

form.reset();

}else{

status.classList.remove("hidden");
status.classList.remove("text-green-600");
status.classList.add("text-red-600");

status.innerText="Something went wrong. Please try again.";

}

});
</script>

</body>
</html>
