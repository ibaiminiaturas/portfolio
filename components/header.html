<header class="bg-gray-200 sticky top-0 z-50 h-36 flex items-center px-6">

  <!-- Logo + nombre a la izquierda -->
  <div class="flex items-center gap-3">
    <img src="/assets/images/ibai-miniaturas-circle.png" alt="Logo" class="h-20 w-20 rounded-full">
    <span class="text-3xl font-bold text-gray-800">Ibai Miniaturas</span>
  </div>

  <!-- Menú centrado -->
  <ul class="absolute left-1/2 -translate-x-1/2 flex space-x-16 items-center text-2xl font-semibold text-gray-800">
    <li><a href="/index.html" class="hover:text-gray-400 transition-colors duration-200" data-i18n="menu.home"></a></li>

    <li class="relative" id="menu-galerias">
       <span class="cursor-default hover:text-gray-400 transition-colors duration-200" data-i18n="menu.gallery"></span>
      <!-- Submenú generado desde JSON -->
      <div id="dropdown-galerias" class="absolute hidden bg-gray-400 mt-2 rounded w-max text-white">
        <script>
          fetch('/galeries.json')
            .then(res => res.json())
            .then(data => {
              const dropdown = document.getElementById('dropdown-galerias');
              Object.keys(data).forEach(sectionName => {
                const sectionSubs = data[sectionName];

                const li = document.createElement("div");
                li.className = "relative";

                // Link principal de la galería
                const aMain = document.createElement("a");
                aMain.href = `/galleries/index.html?galeria=${encodeURIComponent(sectionName)}`;
                aMain.textContent = sectionName;
                aMain.className = "block px-4 py-2 cursor-pointer rounded hover:bg-gray-700 w-full text-left text-white whitespace-nowrap";
                li.appendChild(aMain);

                // Submenú si hay subgalerías
                if (sectionSubs.length > 0) {
                  const subMenu = document.createElement("div");
                  subMenu.className = "absolute top-0 left-full hidden bg-gray-700 py-2 rounded shadow-lg";
                  subMenu.style.whiteSpace = "nowrap";
                  subMenu.style.minWidth = "max-content";

                  sectionSubs.forEach(sub => {
                    const aSub = document.createElement("a");
                    aSub.href = `/galleries/index.html?galeria=${encodeURIComponent(sectionName)}&sub=${encodeURIComponent(sub.name)}`;
                    aSub.textContent = sub.displayName || sub.name;
                    aSub.className = "block px-4 py-2 rounded hover:bg-gray-600 text-white";
                    subMenu.appendChild(aSub);
                  });

                  li.appendChild(subMenu);

                  li.addEventListener("mouseenter", () => subMenu.classList.remove("hidden"));
                  li.addEventListener("mouseleave", () => subMenu.classList.add("hidden"));
                }

                dropdown.appendChild(li);
              });

              // Hover persistente del dropdown principal
              const menu = document.getElementById("menu-galerias");
              let timeout;
              menu.addEventListener("mouseenter", () => {
                clearTimeout(timeout);
                dropdown.classList.remove("hidden");
              });
              menu.addEventListener("mouseleave", () => {
                timeout = setTimeout(() => {
                  dropdown.classList.add("hidden");
                }, 100);
              });
            })
            .catch(err => console.error('Error cargando galerías:', err));
        </script>
      </div>
    </li>

    <li><a href="/about.html#" class="hover:text-gray-400 transition-colors duration-200" data-i18n="menu.about"></a></li>
    <li><a href="/contacto.html" class="hover:text-gray-400 transition-colors duration-200" data-i18n="menu.contact"></a></li>
  </ul>
<!-- Selector de idiomas -->
<div class="absolute right-24 flex items-center gap-3">
  <img src="/assets/images/flag-es.svg" alt="Español" class="h-8 w-10 cursor-pointer hover:opacity-70 transition-opacity duration-200" onclick="loadLanguage('es')">
  <img src="/assets/images/flag-uk.png" alt="English" class="h-8 w-10 cursor-pointer hover:opacity-70 transition-opacity duration-200" onclick="loadLanguage('en')">
</div>
  <!-- Icono de Instagram a la derecha -->
  <div class="absolute right-6 flex items-center">
    <a href="https://www.instagram.com/ibaiminiaturas" target="_blank" rel="noopener noreferrer" class="hover:opacity-70 transition-opacity duration-200">
      <img src="/assets/images/instagram.png" alt="Instagram" class="h-12 w-12">
    </a>
  </div>

</header>
