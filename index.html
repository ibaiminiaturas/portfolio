<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portfolio de Miniaturas</title>
<link rel="stylesheet" href="assets/css/output.css">
</head>
<body class="bg-gray-100 font-sans">

<header class="bg-gray-900 text-white p-4 sticky top-0 z-50 shadow-md">
  <nav class="container mx-auto flex justify-center">
    <ul class="flex space-x-10 items-center">
      <li><a href="index.html" class="hover:text-yellow-400">Inicio</a></li>

      <!-- Galerías -->
      <li class="relative" id="menu-galerias">
        <span class="cursor-pointer hover:text-yellow-400">Galerías</span>
        <div id="dropdown-galerias" class="absolute hidden bg-gray-800 mt-2 p-4 rounded shadow-lg min-w-[220px]">
          <!-- JS generará los submenus -->
        </div>
      </li>

      <li><a href="index.html#sobre-mi" class="hover:text-yellow-400">Sobre mí</a></li>
      <li><a href="index.html#contacto" class="hover:text-yellow-400">Contacto</a></li>
    </ul>
  </nav>
</header>

<script>
const galerias = [
  { section: "Box Arts", subs: [
      { name: "MarvelUnited", url: "galleries/data/box-arts/MarvelUnited/index.html" },
      { name: "SOIF", url: "galleries/data/box-arts/SOIF/index.html" },
      { name: "Other Works", url: "galleries/data/box-arts/Other/index.html", type: "mosaic" }
    ]},
  { section: "Warhammer", subs: [] },
  { section: "Warhammer 40k", subs: [] }
];

const dropdown = document.getElementById("dropdown-galerias");

// Eliminamos padding extra del dropdown principal
dropdown.className = "absolute hidden bg-gray-800 mt-2 rounded shadow-lg w-max";

galerias.forEach(section => {
  const li = document.createElement("div");
  li.className = "relative";

  const span = document.createElement("div");
  span.textContent = section.section;
  // Mantener mayúsculas y padding, pero el hover abarca todo
  span.className = "block px-4 py-2 cursor-pointer rounded hover:bg-gray-700 w-full";
  li.appendChild(span);

  if(section.subs && section.subs.length > 0){
    const subMenu = document.createElement("div");
    subMenu.className = "absolute top-0 left-full hidden bg-gray-700 py-2 rounded shadow-lg min-w-[200px]";

    section.subs.forEach(sub => {
      const a = document.createElement("a");
      a.href = sub.url;
      a.textContent = sub.name;
      a.className = "block px-4 py-2 rounded hover:bg-gray-600";
      subMenu.appendChild(a);
    });

    li.appendChild(subMenu);

    li.addEventListener("mouseenter", () => subMenu.classList.remove("hidden"));
    li.addEventListener("mouseleave", () => subMenu.classList.add("hidden"));
  }

  dropdown.appendChild(li);
});

// Hover persistente para el dropdown principal
const menu = document.getElementById("menu-galerias");
let timeout;
menu.addEventListener("mouseenter", () => {
  clearTimeout(timeout);
  dropdown.classList.remove("hidden");
});
menu.addEventListener("mouseleave", () => {
  timeout = setTimeout(() => dropdown.classList.add("hidden"), 300);
});
dropdown.addEventListener("mouseenter", () => clearTimeout(timeout));
dropdown.addEventListener("mouseleave", () => {
  timeout = setTimeout(() => dropdown.classList.add("hidden"), 300);
});
</script>

  <!-- Contenido principal -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-4">Bienvenido a mi portfolio de miniaturas</h1>
    <p>Selecciona una galería en el menú para ver mis trabajos.</p>
  </main>

  <!-- Footer -->
  <footer class="bg-white shadow mt-12 py-4 text-center">
    © 2026 Mi Portfolio de Miniaturas
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
