<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portfolio de Miniaturas</title>
  <link rel="stylesheet" href="assets/css/output.css">
</head>
<body class="bg-gray-100 font-sans">

<div id="header-placeholder"></div>

<script>
  fetch('components/header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-placeholder').innerHTML = html;
      // Cargar el script del menú después de que el header esté en el DOM
      const script = document.createElement('script');
      script.src = 'assets/js-obfuscated/menu.js';
      document.body.appendChild(script);
    });
</script>

<main class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-4">Bienvenido a mi portfolio de miniaturas</h1>
  <p>Selecciona una galería en el menú para ver mis trabajos.</p>
</main>

<footer class="bg-white shadow mt-12 py-4 text-center">
  © 2026 Mi Portfolio de Miniaturas
</footer>
</body>
</html>
