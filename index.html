<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAAAGH! - Under Construction</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        /* Reemplaza 'orko_constructor.png' con el nombre real de tu archivo */
        background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                    url('assets/images/construction.png') no-repeat center center fixed;
        background-size: cover;
        color: #e5e7eb;
        overflow: hidden;
    }

    .container {
        text-align: center;
        max-width: 700px;
        padding: 40px;
        background: rgba(17, 24, 39, 0.6); /* Fondo semi-transparente para legibilidad */
        backdrop-filter: blur(8px);
        border: 2px solid #4b5563;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
        font-size: 3.5rem;
        margin-bottom: 10px;
        color: #fbbf24; /* Color amarillo industrial / Orko */
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 2px 2px 0px #000;
    }

    p {
        font-size: 1.4rem;
        line-height: 1.6;
        color: #d1d5db;
    }

    .fun {
        margin-top: 30px;
        font-style: italic;
        color: #9ca3af;
        border-top: 1px solid #4b5563;
        padding-top: 20px;
    }

    /* Spinner estilo mecánico */
    .spinner {
        margin: 30px auto;
        width: 50px;
        height: 50px;
        border: 6px solid #374151;
        border-top: 6px solid #fbbf24;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .footer {
        margin-top: 40px;
        font-size: 0.8rem;
        color: #6b7280;
        letter-spacing: 1px;
    }
</style>
</head>

<body>

<div class="container">

    <h1>🚧 Under Construction</h1>

 <p class="fun">

</p>
