<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Portfolio de Miniaturas</title>

<!-- TailwindCSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts: Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    overflow-x: hidden;
    font-family: 'Montserrat', sans-serif;
    background-color: #f3f4f6; /* Tailwind bg-gray-100 */
  }
</style>
</head>

<body class="bg-gray-100">

<!-- HEADER STICKY REAL -->
<header id="main-header" class="sticky top-0 z-50 bg-white"></header>

<script>
fetch('components/header.html')
  .then(res => res.text())
  .then(html => {
    const header = document.getElementById('main-header');
    header.innerHTML = html;

    // 1️⃣ Cargamos i18n.js dinámicamente
    const i18nScript = document.createElement('script');
    i18nScript.src = 'assets/js/i18n.js';
    i18nScript.onload = () => {
      // ✅ Solo aquí loadLanguage existe
      loadLanguage("en");

      // 2️⃣ Cargar menú.js después de i18n
      const menuScript = document.createElement('script');
      menuScript.src = 'assets/js/menu.js';
      document.body.appendChild(menuScript);
    };
    document.body.appendChild(i18nScript);

    // Shadow dinámico al hacer scroll
    header.style.transition = 'box-shadow 0.3s ease';
    window.addEventListener('scroll', () => {
      header.style.boxShadow = window.scrollY > 10 ? '0 2px 8px rgba(0,0,0,0.1)' : 'none';
    });
  })
  .catch(err => console.error('Error cargando header:', err));
</script>

<main class="max-w-7xl mx-auto px-4 py-12 space-y-20">

  <!-- Título principal estilo portada -->
  <section class="text-center mb-16">
    <h1 class="text-6xl md:text-7xl font-extrabold text-gray-900 leading-tight" data-i18n="main.hero.title"></h1>
    <p class="mt-6 text-xl md:text-2xl text-gray-700 max-w-3xl mx-auto" data-i18n="main.hero.subtitle"></p>
  </section>

  <!-- Sección de bienvenida -->
  <section class="flex flex-col md:flex-row items-center gap-8">
    <img src="assets/images/miniatura1.jpg" alt="Miniatura pintada" class="w-full md:w-1/2 rounded-lg shadow-lg">
    <div class="md:w-1/2 space-y-6">
      <h2 class="text-4xl font-extrabold text-gray-800" data-i18n="main.welcome.title"></h2>
      <p class="text-gray-700 text-lg" data-i18n="main.welcome.text1"></p>
      <p class="text-gray-600 italic" data-i18n="main.welcome.tip"></p>
    </div>
  </section>

  <!-- Sección técnica con imagen a la derecha -->
  <section class="flex flex-col md:flex-row-reverse items-center gap-8">
    <img src="assets/images/miniatura2.png" alt="Técnica de pincel seco" class="w-full md:w-1/2 rounded-lg shadow-lg">
    <div class="md:w-1/2 space-y-6">
      <h2 class="text-3xl font-bold text-gray-800" data-i18n="main.techniques.title"></h2>
      <p class="text-gray-700 text-lg" data-i18n="main.techniques.text1"></p>
      <p class="text-gray-600" data-i18n="main.techniques.tip"></p>
    </div>
  </section>

  <!-- Sección artística con collage de miniaturas -->
  <section class="space-y-10">
    <h2 class="text-3xl font-bold text-gray-800 text-center mb-8" data-i18n="main.gallery.title"></h2>
    <p class="text-center text-gray-700 mb-6" data-i18n="main.gallery.subtitle"></p>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
      <img src="assets/images/miniatura3.jpg" alt="Miniatura 3" class="rounded-lg shadow-md hover:scale-105 transition-transform">
      <img src="assets/images/miniatura4.jpg" alt="Miniatura 4" class="rounded-lg shadow-md hover:scale-105 transition-transform">
      <img src="assets/images/miniatura5.jpg" alt="Miniatura 5" class="rounded-lg shadow-md hover:scale-105 transition-transform">
      <img src="assets/images/miniatura6.jpg" alt="Miniatura 6" class="rounded-lg shadow-md hover:scale-105 transition-transform">
      <img src="assets/images/miniatura7.jpg" alt="Miniatura 7" class="rounded-lg shadow-md hover:scale-105 transition-transform">
      <img src="assets/images/miniatura8.jpg" alt="Miniatura 8" class="rounded-lg shadow-md hover:scale-105 transition-transform">
    </div>
  </section>

  <!-- Sección divertida y narrativa -->
  <section class="bg-yellow-50 p-8 rounded-xl shadow-lg flex flex-col md:flex-row items-center gap-6">
    <img src="assets/images/miniatura9.png" alt="Miniatura divertida" class="w-full md:w-1/3 rounded-lg shadow-md">
    <div class="md:w-2/3 space-y-4">
      <h2 class="text-3xl font-bold text-gray-800" data-i18n="main.fun.title"></h2>
      <p class="text-gray-700 text-lg" data-i18n="main.fun.text1"></p>
      <p class="text-gray-600 italic" data-i18n="main.fun.tip"></p>
    </div>
  </section>

</main>

<!-- Footer placeholder -->
<div id="footer-placeholder"></div>

<script>
fetch('components/footer.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>

</body>
</html>
