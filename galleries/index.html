<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>
<body class="bg-gray-100 p-6">

  <h1 class="text-4xl font-bold mb-6" id="titulo-galeria">Galería</h1>

  <div id="galeria-container" class="space-y-6"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const galeriaSeleccionada = params.get('galeria'); // Ej: "Box Arts"
  const subSeleccionada = params.get('sub'); // Ej: "MarvelUnited" u otra

  const container = document.getElementById('galeria-container');
  const titulo = document.getElementById('titulo-galeria');

  fetch('../galeries.json')
    .then(res => res.json())
    .then(data => {
      if (!galeriaSeleccionada || !data[galeriaSeleccionada]) {
        container.innerHTML = "<p class='text-xl'>No se encontró la galería.</p>";
        console.log("Galería no encontrada:", galeriaSeleccionada);
        return;
      }

      titulo.textContent = galeriaSeleccionada + (subSeleccionada ? " → " + subSeleccionada : "");

      // Filtrar subgalería si se seleccionó
      let subGalerias = data[galeriaSeleccionada];
      if(subSeleccionada){
        subGalerias = subGalerias.filter(s => s.name === subSeleccionada);
      }

      subGalerias.forEach(sub => {
        const subDiv = document.createElement('div');
        subDiv.className = 'subgaleria flex items-center h-[200px] space-x-4 p-2';

        // Nombre de la subgalería
        const nombreDiv = document.createElement('div');
        nombreDiv.className = 'flex items-center justify-center h-[200px] w-[200px] text-5xl font-bold text-gray-800 break-words pr-[20%]';
        nombreDiv.textContent = sub.name;
        subDiv.appendChild(nombreDiv);

        // Mini carrusel
        const carruselDiv = document.createElement('div');
        carruselDiv.className = 'flex space-x-2';
        carruselDiv.style.height = '200px';

        // Comprobamos si hace falta scroll
        const totalWidth = sub.images * 200 + (sub.images - 1) * 8; // 200px por imagen + gap de 8px
        if(totalWidth > window.innerWidth - 220){ // 220px para el bloque de nombre y padding
          carruselDiv.classList.add('overflow-x-auto');
        }

        for(let i = 1; i <= sub.images; i++){
          const img = document.createElement('img');
          img.src = `data/${galeriaSeleccionada}/${sub.name}/${i}.jpg`;
          img.className = 'w-[200px] h-[200px] object-cover rounded flex-shrink-0';
          carruselDiv.appendChild(img);
        }

        subDiv.appendChild(carruselDiv);
        container.appendChild(subDiv);
      });

    })
    .catch(err => {
      console.error('Error cargando galería:', err);
      container.innerHTML = "<p class='text-xl'>Error cargando la galería.</p>";
    });
</script>
</body>
</html>
