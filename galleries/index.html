<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<!-- TailwindCSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts: Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Macy.js -->
<script src="https://cdn.jsdelivr.net/npm/macy@2.5.1/dist/macy.min.js"></script>

<!-- imagesLoaded -->
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<!-- Estilos generales -->
<style>
  body {
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    margin: 0;
    background-color: #f3f4f6; /* Tailwind bg-gray-100 */
  }

  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #lightbox-img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    transition: opacity 0.3s ease;
  }
  #lightbox-prev, #lightbox-next {
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    padding: 0.5rem;
    cursor: pointer;
    color: white;
    font-size: 2rem;
    z-index: 100;
  }

  /* Galería */
  .gallery {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }
  .gallery img {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>

<body class="bg-gray-100">

<!-- CABECERA FULL WIDTH -->
<div id="header-placeholder"></div>
<script>
fetch('/components/header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('header-placeholder').innerHTML = html;

    const script = document.createElement('script');
    script.src = '/assets/js/menu.js';
    document.body.appendChild(script);
  });
</script>

<h1 class="text-4xl font-semibold mb-6 px-6" id="titulo-galeria">Galería</h1>
<div id="galeria-container" class="space-y-6 px-6"></div>

<!-- LIGHTBOX -->
<div id="lightbox" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <img id="lightbox-img" class="max-h-[90%] max-w-[90%] rounded shadow-lg">
  <button id="lightbox-prev" class="absolute text-white text-5xl hover:text-gray-300">❮</button>
  <button id="lightbox-next" class="absolute text-white text-5xl hover:text-gray-300">❯</button>
</div>

<script src="/assets/js-obfuscated/lightbox.js"></script>

<script type="module">
import { crearMiniCarrusel } from '/assets/js-obfuscated/minicarrusel.js';
import { crearMosaico } from '/assets/js/mosaico.js';

const params = new URLSearchParams(window.location.search);
const galeriaSeleccionada = params.get('galeria');
const subSeleccionada = params.get('sub');

const container = document.getElementById('galeria-container');
const titulo = document.getElementById('titulo-galeria');

fetch('/galeries.json')
.then(res => res.json())
.then(data => {
    if (!galeriaSeleccionada || !data[galeriaSeleccionada]) {
        container.innerHTML = "<p class='text-xl'>No se encontró la galería.</p>";
        return;
    }

    let subGalerias = data[galeriaSeleccionada];
    let tituloGrande;

    // Si hay subgalería, mostramos su displayName grande y filtramos solo esa
    if (subSeleccionada) {
        const subEncontrada = subGalerias.find(s => s.name === subSeleccionada);
        if (subEncontrada) {
            tituloGrande = subEncontrada.displayName || subEncontrada.name;
            subGalerias = [subEncontrada]; // Solo cargamos esta subgalería
        } else {
            tituloGrande = galeriaSeleccionada;
        }
    } else {
        tituloGrande = galeriaSeleccionada;
    }

    // Título grande centrado
    titulo.textContent = tituloGrande;
    titulo.className = "text-8xl font-bold text-center my-12";

    subGalerias.forEach((sub, index) => {
        const images = Array.from({ length: sub.images }, (_, j) =>
            `/galleries/data/${galeriaSeleccionada}/${sub.name}/${j + 1}.jpg`
        );

        const subDiv = document.createElement('div');
        subDiv.className = "mb-32"; // margen inferior uniforme

        const esUltima = index === subGalerias.length - 1;

        if (sub.type === 'mosaic' || esUltima) {
            // Bloque mosaico grande
            const bloqueDiv = document.createElement('div');
            bloqueDiv.className = "flex flex-col items-center mb-32";

            // Si estamos en subgalería, no repetir el título
            if (!subSeleccionada && sub.type === 'mosaic') {
                const nombreDiv = document.createElement('div');
                nombreDiv.className = "text-4xl font-bold text-gray-800 text-center mb-4";
                nombreDiv.textContent = sub.displayName || sub.name;
                bloqueDiv.appendChild(nombreDiv);
            }

            const mosaicoDiv = crearMosaico(sub, images, openLightbox);
            bloqueDiv.appendChild(mosaicoDiv);

            container.appendChild(bloqueDiv);
            return;
        }

        // Bloque mini carrusel
        const titleSection = document.createElement('div');
        titleSection.className = "flex gap-5 items-start mb-5";

        const nombreDiv = document.createElement('div');
        nombreDiv.className = "flex items-center justify-center h-[200px] w-[200px] text-4xl font-bold text-gray-800 break-words text-center flex-shrink-0";
        nombreDiv.textContent = sub.displayName || sub.name;
        titleSection.appendChild(nombreDiv);

        if (index % 2 === 0) {
            subDiv.style.paddingLeft = '15%';
            subDiv.style.paddingRight = '5%';
        } else {
            subDiv.style.paddingLeft = '10%';
            subDiv.style.paddingRight = '10%';
        }

        const carruselWrapper = crearMiniCarrusel(sub, images, openLightbox);
        titleSection.appendChild(carruselWrapper);
        subDiv.appendChild(titleSection);
        container.appendChild(subDiv);
    });
})
.catch(err => {
    console.error('Error cargando galería:', err);
    container.innerHTML = "<p class='text-xl'>Error cargando la galería.</p>";
});
</script>

</body>
</html>
