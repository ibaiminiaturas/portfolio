<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<!-- TailwindCSS -->
<link rel="stylesheet" href="assets/css/output.css">
<link rel="stylesheet" href="assets/css/style.css">

<!-- Google Fonts: Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Macy.js -->
<script src="https://cdn.jsdelivr.net/npm/macy@2.5.1/dist/macy.min.js"></script>

<!-- imagesLoaded -->
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="assets/js/i18n.js"></script>
<!-- Estilos generales -->

</head>

<body class="bg-gray-100">
<!-- LIGHTBOX (SIEMPRE EN EL HTML, NO DINÁMICO) -->
<div id="lightbox" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <img id="lightbox-img" class="max-h-[90%] max-w-[90%] rounded shadow-lg">
  <button id="lightbox-prev" class="absolute text-white text-5xl hover:text-gray-300">❮</button>
  <button id="lightbox-next" class="absolute text-white text-5xl hover:text-gray-300">❯</button>
</div>
<!-- HEADER STICKY REAL -->
<header id="main-header" class="sticky top-0 z-50 bg-white">
</header>

<script>
fetch('components/header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('main-header').innerHTML = html;

      loadLanguage("en");

    // Cargar script de menú extra si hace falta
    const script = document.createElement('script');
    script.src = 'assets/js/menu.js';

    document.body.appendChild(script);
  });
</script>

<h1 class="text-4xl font-semibold my-12 mb-6 px-6" id="titulo-galeria">Galería</h1>
<div id="galeria-container" class="space-y-6 px-6"></div>


<script src="giassets/js/lightbox.js"></script>

<script type="module">
import { crearMiniCarrusel } from 'assets/js/minicarrusel.js';
import { crearMosaico } from 'assets/js/mosaico.js';

const params = new URLSearchParams(window.location.search);
const galeriaSeleccionada = params.get('galeria');
const subSeleccionada = params.get('sub');

const container = document.getElementById('galeria-container');
const titulo = document.getElementById('titulo-galeria');

fetch('/galeries.json')
.then(res => res.json())
.then(data => {
    if (!galeriaSeleccionada || !data[galeriaSeleccionada]) {
        container.innerHTML = "<p class='text-xl'>No se encontró la galería.</p>";
        return;
    }

    let subGalerias = data[galeriaSeleccionada];
    let tituloGrande;

    if (subSeleccionada) {
        const subEncontrada = subGalerias.find(s => s.name === subSeleccionada);
        if (subEncontrada) {
            tituloGrande = subEncontrada.displayName || subEncontrada.name;
            subGalerias = [subEncontrada];
        } else {
            tituloGrande = galeriaSeleccionada;
        }
    } else {
        tituloGrande = galeriaSeleccionada;
    }

    titulo.textContent = tituloGrande;
titulo.className = "text-8xl font-bold text-center mt-6 mb-12 text-white";

    subGalerias.forEach((sub, index) => {
  const images = Array.from({length: sub.images}, (_, j) =>
    `/galleries/data/${galeriaSeleccionada}/${sub.name}/${j+1}.jpg`
  );

  const subDiv = document.createElement('div');
  subDiv.style.marginBottom = '120px';

  // Bloque mosaico
  if(sub.type === 'mosaic'){
    const bloqueDiv = document.createElement('div');
    bloqueDiv.style.display = 'flex';
    bloqueDiv.style.flexDirection = 'column';
    bloqueDiv.style.alignItems = 'center';
    bloqueDiv.style.marginBottom = '120px';

    // Título pequeño solo si NO estamos en subgalería directa
    if(!subSeleccionada){
      const nombreDiv = document.createElement('div');
      nombreDiv.className = 'text-4xl font-bold text-white text-center mb-12';
      nombreDiv.textContent = sub.displayName || sub.name;
      bloqueDiv.appendChild(nombreDiv);
    }

    const mosaicoDiv = crearMosaico(sub, images, openLightbox);
    mosaicoDiv.querySelectorAll('img').forEach((img, i) => {
      img.addEventListener('click', () => window.openLightbox(images, i));
    });
    bloqueDiv.appendChild(mosaicoDiv);
    subDiv.appendChild(bloqueDiv);
    container.appendChild(subDiv);
    return;
  }

  // Última subgalería
  const esUltima = index === subGalerias.length - 1;
  if(esUltima){
    const bloqueDiv = document.createElement('div');
    bloqueDiv.style.display = 'flex';
    bloqueDiv.style.flexDirection = 'column';
    bloqueDiv.style.alignItems = 'center';
    bloqueDiv.style.marginBottom = '120px';

    if(!subSeleccionada){
      const nombreDiv = document.createElement('div');
      nombreDiv.className = 'text-4xl font-bold my-12 text-black !important text-center mb-12';
      nombreDiv.textContent = sub.displayName || sub.name;
      bloqueDiv.appendChild(nombreDiv);
    }

    const mosaicoDiv = crearMosaico(sub, images, openLightbox);
    mosaicoDiv.querySelectorAll('img').forEach((img, i) => {
      img.addEventListener('click', () => window.openLightbox(images, i));
    });
    bloqueDiv.appendChild(mosaicoDiv);
    subDiv.appendChild(bloqueDiv);
    container.appendChild(subDiv);
    return;
  }

  // Mini carrusel para todo lo demás
  const titleSection = document.createElement('div');
  titleSection.className = "flex gap-5 items-start mb-5";

  const nombreDiv = document.createElement('div');
  nombreDiv.className = "flex items-center justify-center h-[200px] w-[200px] flex-shrink-0 break-words carrusel-titulo";
  nombreDiv.textContent = sub.displayName || sub.name;
  titleSection.appendChild(nombreDiv);

  if (index % 2 === 0) {
      subDiv.style.paddingLeft = '15%';
      subDiv.style.paddingRight = '5%';
  } else {
      subDiv.style.paddingLeft = '10%';
      subDiv.style.paddingRight = '10%';
  }


const carruselWrapper = crearMiniCarrusel(sub, images);
carruselWrapper.querySelectorAll('img').forEach((img, i) => {
    img.classList.add('carrusel-img'); // 🔹 Mantener la clase de animación
    img.addEventListener('click', () => openLightbox(images, i));
});
  titleSection.appendChild(carruselWrapper);
  subDiv.appendChild(titleSection);
  container.appendChild(subDiv);
});
})
.catch(err => {
    console.error('Error cargando galería:', err);
    container.innerHTML = "<p class='text-xl'>Error cargando la galería.</p>";
});
</script>

<!-- Footer placeholder -->
<div id="footer-placeholder"></div>

<script>
  fetch('components/footer.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('footer-placeholder').innerHTML = html;
    });
</script>

</body>
</html>
