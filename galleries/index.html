<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Macy.js -->
<script src="https://cdn.jsdelivr.net/npm/macy@2.5.1/dist/macy.min.js"></script>
<!-- imagesLoaded -->
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<style>
@font-face {
  font-family: 'Akira';
  src: url('/assets/fonts/Akira.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

body {
  font-family: 'Akira', sans-serif;
}
.scrollbar-hide::-webkit-scrollbar {
  display: none;
}
.scrollbar-hide {
  -ms-overflow-style: none;
  scrollbar-width: none;
}
@keyframes zoomIn {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
@keyframes zoomOut {
  from { transform: scale(1.1); }
  to { transform: scale(1); }
}

/* Lightbox */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#lightbox-img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  transition: opacity 0.3s ease;
}
#lightbox-prev,
#lightbox-next {
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  padding: 0.5rem;
  cursor: pointer;
  color: white;
  font-size: 2rem;
  z-index: 100;
}

/* Galería */
.gallery {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}
.gallery img {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>

<body class="bg-gray-100">

<!-- CABECERA -->
<div id="header-placeholder"></div>
<script>
fetch('/components/header.html')
.then(res => res.text())
.then(html => {
  document.getElementById('header-placeholder').innerHTML = html;
  const script = document.createElement('script');
  script.src = '/assets/js/menu.js';
  document.body.appendChild(script);
});
</script>

<h1 class="text-4xl font-bold mb-6 px-6">Galería</h1>
<div id="galeria-container" class="space-y-6 px-6"></div>

<!-- LIGHTBOX -->
<div id="lightbox" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <img id="lightbox-img" class="max-h-[90%] max-w-[90%] rounded shadow-lg">
  <button id="lightbox-prev" class="absolute text-white text-5xl hover:text-gray-300">❮</button>
  <button id="lightbox-next" class="absolute text-white text-5xl hover:text-gray-300">❯</button>
</div>

<script src="/assets/js-obfuscated/lightbox.js"></script>
<script type="module" src="/assets/js/gallery.js"></script>

</body>
</html>
