<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<!-- TailwindCSS -->
<link rel="stylesheet" href="assets/css/output.css">
<link rel="stylesheet" href="assets/css/style.css">

<!-- Google Fonts: Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Macy.js -->
<script src="https://cdn.jsdelivr.net/npm/macy@2.5.1/dist/macy.min.js"></script>

<!-- imagesLoaded -->
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/config.js"></script> <!-- define BASE_PATH -->
<script src="assets/js/utils.js"></script>
<!-- Estilos generales -->

</head>
<style>
body {
  margin:0;
  overflow-x:hidden;
  font-family:'Montserrat',sans-serif;
  background-color:#f3f4f6;
}
</style>
<body class="bg-gray-100">
<!-- LIGHTBOX (SIEMPRE EN EL HTML, NO DINÁMICO) -->
<div id="lightbox" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <img id="lightbox-img" class="max-h-[90%] max-w-[90%] rounded shadow-lg">
  <button id="lightbox-prev" class="absolute text-white text-5xl hover:text-gray-300">❮</button>
  <button id="lightbox-next" class="absolute text-white text-5xl hover:text-gray-300">❯</button>
</div>
<!-- HEADER STICKY REAL -->
<header id="main-header" class="sticky top-0 z-50 bg-white">
</header>

<script>

// Función para buscar una subgalería recursivamente por su "name"
function buscarSubgaleria(lista, nombreBusqueda) {
    for (const item of lista) {
        if (item.name === nombreBusqueda) return item;
        if (item.subs && item.subs.length > 0) {
            const encontrado = buscarSubgaleria(item.subs, nombreBusqueda);
            if (encontrado) return encontrado;
        }
    }
    return null;
}

fetch(`${BASE_PATH}/components/header.html`)
  .then(res => res.text())
  .then(html => {
    document.getElementById('main-header').innerHTML = html;

      loadLanguage("en");

    // Cargar script de menú extra si hace falta
    const script = document.createElement('script');
    script.src =  `${BASE_PATH}/assets/js/menu.js`;

    document.body.appendChild(script);
    loadHeader("");
  });
</script>

<h1 class="text-4xl font-semibold my-12 mb-6 px-6" id="titulo-galeria">Galería</h1>
<div id="galeria-container" class="space-y-6 px-6"></div>


<script src="assets/js/lightbox.js"></script>

<script type="module">
import { crearMiniCarrusel } from './assets/js/minicarrusel.js';
import { crearMosaico } from './assets/js/mosaico.js';

const params = new URLSearchParams(window.location.search);
let galeriaSeleccionada = params.get('galeria');
if (galeriaSeleccionada) galeriaSeleccionada = decodeURIComponent(galeriaSeleccionada);

const allSubs = params.getAll('sub');
const subSeleccionada = allSubs.length > 0 ? allSubs[allSubs.length - 1] : null;

const container = document.getElementById('galeria-container');
const titulo = document.getElementById('titulo-galeria');

// Función de búsqueda recursiva
function buscarSubgaleria(lista, nombreBusqueda) {
    for (const item of lista) {
        if (item.name === nombreBusqueda) return item;
        if (item.subs && item.subs.length > 0) {
            const encontrado = buscarSubgaleria(item.subs, nombreBusqueda);
            if (encontrado) return encontrado;
        }
    }
    return null;
}

fetch(`${BASE_PATH}/assets/galeries.json`)
.then(res => res.json())
.then(data => {
    if (!galeriaSeleccionada || !data[galeriaSeleccionada]) {
        container.innerHTML = "<p class='text-xl text-center'>No se encontró la categoría principal.</p>";
        return;
    }

    let subGaleriasFinales = [];
    let tituloGrande = galeriaSeleccionada;
    const basePathRaiz = `${BASE_PATH}/galleries/data/${galeriaSeleccionada}`;

    // --- LÓGICA DE RECOLECCIÓN ---
    if (subSeleccionada) {
        // MODO SUBGALERÍA (Igual que antes, para niveles profundos)
        const encontrada = buscarSubgaleria(data[galeriaSeleccionada], subSeleccionada);
        if (encontrada) {
            tituloGrande = encontrada.displayName || encontrada.name;
            let pathAcumulado = basePathRaiz;
            if (allSubs.length > 1) {
                for (let i = 0; i < allSubs.length - 1; i++) {
                    pathAcumulado += `/${allSubs[i]}`;
                }
            }
            if (encontrada.subs && encontrada.subs.length > 0) {
                pathAcumulado += `/${encontrada.name}`;
                subGaleriasFinales = encontrada.subs.map(s => ({
                    ...s, 
                    calculatedPath: `${pathAcumulado}/${s.name}`
                }));
            } else {
                subGaleriasFinales = [{
                    ...encontrada, 
                    calculatedPath: `${pathAcumulado}/${encontrada.name}`
                }];
            }
        }
    } else {
        // MODO RAÍZ (BOX ARTS): Un mosaico por cada hijo directo, pero PROFUNDO
        // Si Box Arts tiene "SOIF" y "Big Child", saldrán 2 bloques.
        // El bloque "Big Child" contendrá sus fotos Y las de sus hijos (Cyberpunk, etc)
        subGaleriasFinales = data[galeriaSeleccionada].map(hijoDirecto => {
            let todasLasFotos = [];
            
            const recolectarFotosRecursivo = (item, pathActual) => {
                const miPath = `${pathActual}/${item.name}`;
                // Añadir fotos de este nivel
                for (let i = 1; i <= (item.images || 0); i++) {
                    todasLasFotos.push(`${miPath}/${i}.jpg`);
                }
                // Bajar a los hijos
                if (item.subs) {
                    item.subs.forEach(s => recolectarFotosRecursivo(s, miPath));
                }
            };

            recolectarFotosRecursivo(hijoDirecto, basePathRaiz);

            return {
                ...hijoDirecto,
                type: 'mosaic', // Forzamos mosaico para la vista general
                listaFotosCombinada: todasLasFotos
            };
        });
    }

    titulo.textContent = tituloGrande;
    titulo.className = "text-8xl font-bold text-center mt-6 mb-12 text-gray-700";

    // --- RENDERIZADO (RESPETANDO PADDINGS Y DISEÑO AL 100%) ---
    subGaleriasFinales.forEach((sub, index) => {
        // Si estamos en modo raíz, usamos la lista combinada. Si no, generamos la normal.
        const images = sub.listaFotosCombinada || 
            Array.from({length: sub.images}, (_, j) => `${sub.calculatedPath}/${j+1}.jpg`);

        if (images.length === 0) return;

        const subDiv = document.createElement('div');
        subDiv.style.marginBottom = '120px';

        if (sub.type === 'mosaic') {
            const bloqueDiv = document.createElement('div');
            bloqueDiv.className = 'flex flex-col items-center mb-[120px]';
            bloqueDiv.style.padding = '10px';  
            bloqueDiv.style.display = 'flex';
            bloqueDiv.style.flexDirection = 'column';
            bloqueDiv.style.alignItems = 'center';
            bloqueDiv.style.marginBottom = '120px';

            if (!subSeleccionada) {
                const nombreDiv = document.createElement('div');
                nombreDiv.className = 'text-4xl font-bold text-gray-500 text-center mb-12';
                nombreDiv.textContent = sub.displayName || sub.name;
                bloqueDiv.appendChild(nombreDiv);
            }

            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'bg-gray-700 rounded-xl  p-[10px] max-w-[800px] inline-block';
        wrapperDiv.style.maxWidth = '1000px';
        wrapperDiv.style.display = 'flex';
        wrapperDiv.style.justifyContent = 'center';
        wrapperDiv.style.padding = '10px';
        wrapperDiv.style.alignItems = 'center';
            // Pasamos el array de imágenes directamente
            const mosaicoDiv = crearMosaico(sub, images, openLightbox);
            mosaicoDiv.querySelectorAll('img').forEach((img, i) => {
                img.addEventListener('click', () => openLightbox(images, i));
            });

            wrapperDiv.appendChild(mosaicoDiv);
            bloqueDiv.appendChild(wrapperDiv);
            subDiv.appendChild(bloqueDiv);
            container.appendChild(subDiv);
        } else {
            // CARRUSEL CON ZIG-ZAG Y PADDINGS EXACTOS
            const titleSection = document.createElement('div');
            titleSection.className = 'flex gap-5 items-center mb-5';

            const nombreDiv = document.createElement('div');
            nombreDiv.textContent = sub.displayName || sub.name;
            nombreDiv.className = 'flex items-center justify-center h-[200px] w-[200px] flex-shrink-0 break-words carrusel-titulo';

            const wrapperDivCarrusel = document.createElement('div');
            wrapperDivCarrusel.className = 'bg-gray-700 rounded-xl flex-grow box-border max-w-[1000px] flex justify-center p-[10px] items-center';
            wrapperDivCarrusel.style.maxWidth = '1000px';
            wrapperDivCarrusel.style.display = 'flex';
            wrapperDivCarrusel.style.justifyContent = 'center';
            wrapperDivCarrusel.style.padding = '10px';
            wrapperDivCarrusel.style.alignItems = 'center';

            const carruselWrapper = crearMiniCarrusel(sub, images);
            carruselWrapper.querySelectorAll('img').forEach((img, i) => {
                img.classList.add('carrusel-img');
                img.addEventListener('click', () => openLightbox(images, i));
            });

            wrapperDivCarrusel.appendChild(carruselWrapper);

            // RESPETO ABSOLUTO A TUS PADDINGS
            if (index % 2 === 0) {
                subDiv.style.paddingLeft = '15%';
                subDiv.style.paddingRight = '5%';
            } else {
                subDiv.style.paddingLeft = '10%';
                subDiv.style.paddingRight = '10%';
            }

            titleSection.appendChild(nombreDiv);
            titleSection.appendChild(wrapperDivCarrusel);
            subDiv.appendChild(titleSection);
            container.appendChild(subDiv);
        }
    });
})
.catch(err => {
    console.error('Error cargando galería:', err);
    container.innerHTML = "<p class='text-xl'>Error cargando la galería.</p>";
});
</script>

<!-- Footer placeholder -->
<div id="footer-placeholder"></div>

<script>

  fetch(`${BASE_PATH}/components/footer.html`)
    .then(res => res.text())
    .then(html => {
      document.getElementById('footer-placeholder').innerHTML = html;

    });

</script>

</body>
</html>
