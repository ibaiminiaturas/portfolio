<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | Ibai Miniaturas</title>

    <link rel="stylesheet" href="assets/css/output.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/macy@2.5.1/dist/macy.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/utils.js"></script>

    <style>
        body {
            margin:0;
            overflow-x:hidden;
            font-family:'Montserrat',sans-serif;
            background-color:#f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-100">

<div id="lightbox" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[9999]">
    <img id="lightbox-img" class="rounded shadow-2xl object-contain" style="max-height: 95vh; max-width: 95vw; width: auto; height: auto;">
    <button id="lightbox-prev" class="absolute text-white text-6xl hover:text-gray-300 z-[10000] p-4 select-none" style="left: 20px;">❮</button>
    <button id="lightbox-next" class="absolute text-white text-6xl hover:text-gray-300 z-[10000] p-4 select-none" style="right: 20px;">❯</button>
</div>

<header id="main-header" class="sticky top-0 z-50 bg-white"></header>

<script>
    // 1. CARGA DEL HEADER Y MENÚ
    fetch(`${BASE_PATH}/components/header.html`)
      .then(res => res.text())
      .then(html => {
        document.getElementById('main-header').innerHTML = html;
        if (typeof loadLanguage === 'function') loadLanguage("en");
        if (typeof loadHeader === 'function') loadHeader("");

        // Cargamos el menú DESPUÉS de inyectar el HTML
        const scriptMenu = document.createElement('script');
        scriptMenu.src = `assets/js/menu.js`;
        scriptMenu.onload = () => { if(window.initializeMenu) window.initializeMenu(); };
        document.body.appendChild(scriptMenu);
      });
</script>

<h1 class="text-8xl font-bold text-center mt-6 mb-12 text-gray-700 uppercase" id="titulo-galeria">Galería</h1>
<div id="galeria-container" class="space-y-6 px-6"></div>

<script src="assets/js/lightbox.js"></script>

<script type="module">
import { crearMiniCarrusel } from './assets/js/minicarrusel.js';
import { crearMosaico } from './assets/js/mosaico.js';

const params = new URLSearchParams(window.location.search);
let galeriaSeleccionada = params.get('galeria');
if (galeriaSeleccionada) galeriaSeleccionada = decodeURIComponent(galeriaSeleccionada);

const allSubs = params.getAll('sub');
const subSeleccionada = allSubs.length > 0 ? allSubs[allSubs.length - 1] : null;

const container = document.getElementById('galeria-container');
const titulo = document.getElementById('titulo-galeria');

function buscarEnItems(lista, nombreBusqueda) {
    if (!lista) return null;
    for (const item of lista) {
        if (item.name === nombreBusqueda) return item;
        if (item.subs) {
            const encontrado = buscarEnItems(item.subs, nombreBusqueda);
            if (encontrado) return encontrado;
        }
    }
    return null;
}

fetch(`${BASE_PATH}/assets/galeries.json`)
.then(res => res.json())
.then(data => {
    const categoriaRaiz = data.find(c => c.category === galeriaSeleccionada);
    if (!galeriaSeleccionada || !categoriaRaiz) {
        container.innerHTML = "<p class='text-xl text-center'>No se encontró la categoría principal.</p>";
        return;
    }

    let itemsParaRenderizar = [];
    const folderRaiz = categoriaRaiz.folder || categoriaRaiz.category;
    const basePathRaiz = `${BASE_PATH}/galleries/data/${folderRaiz}`;

    if (subSeleccionada) {
        const listaBusqueda = categoriaRaiz.items || [];
        const encontrada = buscarEnItems(listaBusqueda, subSeleccionada);
        if (encontrada) {
            let pathAcumulado = basePathRaiz;
            if (allSubs.length > 1) {
                for (let i = 0; i < allSubs.length - 1; i++) {
                    pathAcumulado += `/${allSubs[i]}`;
                }
            }
            if (encontrada.subs && encontrada.subs.length > 0) {
                const pathHijos = `${pathAcumulado}/${encontrada.name}`;
                itemsParaRenderizar = encontrada.subs.map(s => ({
                    ...s,
                    calculatedPath: `${pathHijos}/${s.name}`,
                    renderType: 'carousel' 
                }));
            } else {
                itemsParaRenderizar = [{
                    ...encontrada,
                    calculatedPath: `${pathAcumulado}/${encontrada.name}`,
                    renderType: 'mosaic'
                }];
            }
        }
    } else {
        const listaAProcesar = categoriaRaiz.items || [categoriaRaiz];
        itemsParaRenderizar = listaAProcesar.map(hijo => {
            let fotosFucionadas = [];
            const recolectar = (item, pathActual) => {
                const idNombre = item.name || item.category || "";
                if (!idNombre) return;
                const nombreLimpio = idNombre.toLowerCase().replace(/\s+/g, '-');
                const miPath = item.name ? `${pathActual}/${item.name}` : pathActual;
                for (let i = 1; i <= (item.images || 0); i++) {
                    fotosFucionadas.push(`${miPath}/${nombreLimpio}-${i}.webp`);
                }
                if (item.subs) item.subs.forEach(s => recolectar(s, miPath));
                if (item.items) item.items.forEach(s => recolectar(s, miPath));
            };
            recolectar(hijo, basePathRaiz);
            return {
                ...hijo,
                name: hijo.name || hijo.category,
                forcedImages: fotosFucionadas,
                renderType: 'mosaic'
            };
        });
    }

    // Actualizar Título con i18n
    const claveI18n = subSeleccionada ? `galeries.${subSeleccionada}` : `galeries.${galeriaSeleccionada}`;
    titulo.setAttribute('data-i18n', claveI18n);
    const textoTraducido = (typeof t === 'function') ? t(claveI18n) : claveI18n;
    titulo.textContent = (textoTraducido !== claveI18n) ? textoTraducido : (subSeleccionada || galeriaSeleccionada);

    // Renderizado final
    itemsParaRenderizar.forEach((item, index) => {
        const idParaArchivo = item.name || item.category || "image";
        const prefix = idParaArchivo.toLowerCase().replace(/\s+/g, '-');
        const images = item.forcedImages || Array.from({length: item.images}, (_, j) => `${item.calculatedPath}/${prefix}-${j+1}.webp`);

        if (images.length === 0) return;
        const subDiv = document.createElement('div');
        subDiv.style.marginBottom = '120px';

        if (item.renderType === 'mosaic') {
            const bloqueDiv = document.createElement('div');
            bloqueDiv.className = 'flex flex-col items-center mb-[120px]';
            if (!subSeleccionada && itemsParaRenderizar.length > 1) {
                const nombreDiv = document.createElement('div');
nombreDiv.className = 'text-4xl font-bold text-gray-500 text-center mb-12 uppercase i18n-label';
        const clave = `galeries.${item.name}`;
        nombreDiv.setAttribute('data-i18n', clave);
        
        // Traducir en el momento
        nombreDiv.textContent = (typeof t === 'function') ? t(clave) : item.name;
        bloqueDiv.appendChild(nombreDiv);
            }
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'bg-gray-700 rounded-xl p-[10px] max-w-[1000px] flex justify-center items-center';
            const mosaicoDiv = crearMosaico(item, images, window.openLightbox);
            wrapperDiv.appendChild(mosaicoDiv);
            bloqueDiv.appendChild(wrapperDiv);
            subDiv.appendChild(bloqueDiv);
        } else {
            const titleSection = document.createElement('div');
            titleSection.className = 'flex gap-5 items-center mb-5'; 
            const nombreDiv = document.createElement('div');
            const clave = `galeries.${item.name}`;
    nombreDiv.setAttribute('data-i18n', clave);
            nombreDiv.className = 'flex items-center justify-center h-[200px] w-[200px] flex-shrink-0 break-words carrusel-titulo font-bold text-gray-500 uppercase';
           nombreDiv.textContent = (typeof t === 'function') ? t(clave) : item.name;
            
            const wrapperDivCarrusel = document.createElement('div');
            wrapperDivCarrusel.className = 'bg-gray-700 rounded-xl flex-grow max-w-[1000px] flex justify-center p-[10px] items-center';
            const carruselWrapper = crearMiniCarrusel(item, images);
            carruselWrapper.querySelectorAll('img').forEach((img, i) => {
                img.addEventListener('click', () => window.openLightbox(images, i));
            });
            wrapperDivCarrusel.appendChild(carruselWrapper);

            if (index % 2 === 0) {
                subDiv.style.paddingLeft = '15%';
                subDiv.style.paddingRight = '5%';
                titleSection.appendChild(nombreDiv);
                titleSection.appendChild(wrapperDivCarrusel);
            } else {
                subDiv.style.paddingLeft = '5%';
                subDiv.style.paddingRight = '15%';
                titleSection.appendChild(wrapperDivCarrusel);
                titleSection.appendChild(nombreDiv);
            }
            subDiv.appendChild(titleSection);
        }
        container.appendChild(subDiv);
    });
});
</script>

<div id="footer-placeholder"></div>
<script>
  fetch(`${BASE_PATH}/components/footer.html`)
    .then(res => res.text())
    .then(html => { document.getElementById('footer-placeholder').innerHTML = html; });
</script>

</body>
</html>
