<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Under Construction</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f4f6;
    color:#374151;
}

.container{
    text-align:center;
    max-width:600px;
    padding:20px;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

p{
    font-size:1.2rem;
    color:#6b7280;
}

.fun{
    margin-top:20px;
    font-style:italic;
    color:#4b5563;
}

.spinner{
    margin:30px auto;
    width:40px;
    height:40px;
    border:4px solid #d1d5db;
    border-top:4px solid #374151;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.footer{
    margin-top:30px;
    font-size:0.9rem;
    color:#9ca3af;
}
</style>
</head>

<body>

<div class="container">

<h1>🚧 Site Under Construction</h1>

<p>
This portfolio is currently being updated.<br>
Please check back soon.
</p>

<div class="spinner"></div>

<p class="fun">
The owner of this portfolio is currently building his own website.<br>
Is he crazy? Possibly. But it will be worth it.
</p>

<div class="footer">
© 2026
</div>

</div>

</body>
</html>
